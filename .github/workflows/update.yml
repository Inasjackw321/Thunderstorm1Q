name: update-tornado-heatmap

on:
  schedule:
    # Every 12 hours at 00 / 12 UTC. GFS new cycles land at
    # 00/06/12/18Z so this catches the 00Z and 12Z runs; HRRR
    # updates hourly but the gain past every-12h is small for a
    # 1-3 day public forecast product.
    - cron: '0 0,12 * * *'
  workflow_dispatch:
  # Re-run automatically whenever the model code or workflow itself
  # changes, so a deploy of new physics produces fresh data
  # immediately rather than waiting for the next cron tick.
  push:
    branches:
      - main
      - claude/thunderstorm-setup-KlAVq
    paths:
      - 'scripts/**'
      - '.github/workflows/update.yml'

permissions:
  contents: write

concurrency:
  group: tornado-heatmap
  # Let queued runs finish instead of killing mid-fetch — the whole
  # batch is wasted if we cancel on the last retry.
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - name: install deps
        run: pip install -q -r scripts/requirements.txt
      - name: day 1 (HRRR, hours 1-24)
        timeout-minutes: 10
        run: python scripts/update_day1.py
      - name: days 2 + 3 (GFS, one fetch -> two day files)
        timeout-minutes: 10
        continue-on-error: true
        run: python scripts/update_day23.py
      - name: commit data
        run: |
          git config user.name  "tornado-bot"
          git config user.email "tornado-bot@users.noreply.github.com"
          git add data/day1.json data/day1.meta.json \
                  data/day2.json data/day2.meta.json \
                  data/day3.json data/day3.meta.json
          if git diff --cached --quiet; then
            echo "no data changes"
            exit 0
          fi
          git commit -m "data: $(date -u +%FT%TZ)"
          # Retry pushes so the job survives transient network blips.
          push_with_retry() {
            for i in 1 2 3 4; do
              if git push "$@"; then return 0; fi
              [ "$i" = "4" ] && return 1
              sleep $((2 ** i))
            done
          }
          push_with_retry || exit 1
          # GitHub Pages serves from the legacy claude/thunderstorm-setup-KlAVq
          # branch. Force-mirror it to the just-committed HEAD so each cron
          # run automatically redeploys the public site with fresh data.
          push_with_retry --force origin \
            HEAD:refs/heads/claude/thunderstorm-setup-KlAVq || exit 1
