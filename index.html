<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Thunderstorm1Q — T1 tornado risk</title>
<meta name="description" content="Thunderstorm1Q — 3-day CONUS tornado risk map powered by the T1 model. HRRR-backed hours 1–24 plus GFS-backed Day 2 and Day 3, refreshed every 12 hours." />
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' https://unpkg.com;
  style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com;
  font-src https://fonts.gstatic.com;
  img-src 'self' data: https: blob:;
  connect-src 'self' https://*.basemaps.cartocdn.com https://geocoding-api.open-meteo.com;">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />
<link rel="stylesheet" href="css/heatmap.css?v=2026-04-29a" />
</head>
<body>

<main class="map-wrap">
  <div id="map"></div>
  <div class="map-tip" id="map-tip" role="tooltip" aria-hidden="true">
    <span class="map-tip-pct" id="map-tip-pct">0%</span>
    <span class="map-tip-coord" id="map-tip-coord">&mdash;</span>
  </div>
</main>

<header class="brand-strip">
  <div class="brand">
    <svg class="mark" viewBox="0 0 40 40" width="16" height="16" aria-hidden="true">
      <defs>
        <linearGradient id="bolt-g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"  stop-color="#38bdf8"/>
          <stop offset="55%" stop-color="#a78bfa"/>
          <stop offset="100%" stop-color="#ec4899"/>
        </linearGradient>
      </defs>
      <path d="M22 6 L10 22 H18 L16 34 L30 16 H22 Z" fill="url(#bolt-g)"/>
    </svg>
    <span class="b-title">Thunderstorm<span class="accent">1Q</span></span>
    <span class="haz-group" role="tablist" aria-label="Hazard model">
      <button class="haz-chip" role="tab" data-hazard="tornado" aria-selected="true"
              title="T1 — tornado probability (press T)">T1</button>
      <button class="haz-chip" role="tab" data-hazard="wind" aria-selected="false"
              title="W1 — severe-wind probability (press W)">W1</button>
      <button class="haz-chip" role="tab" data-hazard="hail" aria-selected="false"
              title="H1 — significant-hail probability (press H)">H1</button>
    </span>
    <span class="b-divider" aria-hidden="true"></span>
    <span class="b-pct" id="ro-pct">&mdash;</span>
    <span class="b-status" id="ro-status">
      <span class="ro-dot" aria-hidden="true"></span>
      <span class="b-status-text" id="ro-status-text">loading</span>
    </span>
    <span class="b-time" id="ro-time" aria-hidden="true">&mdash;</span>
  </div>
</header>

<div id="state-banner" class="banner" hidden></div>

<div class="search-pop" id="search-pop" role="dialog"
     aria-label="Locate by name or coordinates" hidden>
  <input type="text" id="search-input" autocomplete="off" spellcheck="false"
         placeholder="City, ZIP, or 38.5,-97.5" />
  <button class="search-go" id="search-go" type="button">Go</button>
</div>

<div class="point-panel" id="point-panel" hidden aria-label="Current conditions">
  <header class="pp-head">
    <span class="pp-title" id="pp-title">&mdash;</span>
    <button class="pp-close" id="pp-close" type="button" aria-label="Close">&times;</button>
  </header>
  <div class="pp-coord" id="pp-coord">&mdash;</div>
  <div class="pp-now" id="pp-now">
    <div class="pp-row">
      <span class="pp-key">T1 Tornado</span>
      <span class="pp-val" id="pp-t1">&mdash;</span>
    </div>
    <div class="pp-row">
      <span class="pp-key">W1 Wind</span>
      <span class="pp-val" id="pp-w1">&mdash;</span>
    </div>
    <div class="pp-row">
      <span class="pp-key">H1 Hail</span>
      <span class="pp-val" id="pp-h1">&mdash;</span>
    </div>
  </div>
  <div class="pp-time" id="pp-time">&mdash;</div>
</div>

<footer class="timeline" aria-label="Forecast timeline">
  <div class="day-pills" id="day-pills" role="tablist" aria-label="Forecast day">
    <button class="pill" role="tab" data-day="1" aria-selected="true"
            title="Hours 1-24 (HRRR) — press 1">1-24h</button>
    <button class="pill" role="tab" data-day="2" aria-selected="false"
            title="Day 2, 6-hour max windows (GFS) — press 2">Day 2</button>
    <button class="pill" role="tab" data-day="3" aria-selected="false"
            title="Day 3, 6-hour max windows (GFS) — press 3">Day 3</button>
  </div>

  <div class="spark-wrap">
    <div class="spark" id="spark" role="slider"
         aria-label="Forecast frame"
         aria-valuemin="1" aria-valuemax="24" aria-valuenow="1"
         tabindex="0">
      <div class="spark-track" id="spark-track">
        <div class="spark-fill" id="spark-fill"></div>
      </div>
      <div class="spark-ticks" id="spark-ticks" aria-hidden="true"></div>
      <div class="spark-head" id="spark-head" aria-hidden="true"></div>
      <div class="spark-tip" id="spark-tip" role="tooltip" aria-hidden="true">
        <span class="tip-fh" id="tip-fh">F01</span>
        <span class="tip-pct" id="tip-pct">0%</span>
      </div>
    </div>
  </div>

  <div class="loc-group">
    <button class="icon-btn" id="search-btn" type="button"
            title="Type a location" aria-label="Search location">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
        <circle cx="11" cy="11" r="6" fill="none"
                stroke="currentColor" stroke-width="2"/>
        <line x1="16" y1="16" x2="21" y2="21"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="icon-btn" id="locate-btn" type="button"
            title="Use my GPS location (CONUS only)" aria-label="Locate me">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
        <path fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"
              d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        <circle cx="12" cy="12" r="6" fill="none"
                stroke="currentColor" stroke-width="2"/>
        <circle cx="12" cy="12" r="2" fill="currentColor"/>
      </svg>
    </button>
  </div>
</footer>

<div class="modal" id="locate-error" role="alertdialog"
     aria-labelledby="locate-error-title" aria-modal="true" hidden>
  <div class="modal-card">
    <div class="modal-icon" aria-hidden="true">!</div>
    <h2 class="modal-title" id="locate-error-title">Outside CONUS</h2>
    <p class="modal-body" id="locate-error-body">
      Your location is outside the contiguous United States, so no
      marker was added. T1 only forecasts the CONUS domain.
    </p>
    <button class="modal-ok" id="locate-error-ok" type="button">Got it</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script src="js/heatmap.js?v=2026-04-29a"></script>
</body>
</html>
